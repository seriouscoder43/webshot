openapi: 3.0.3
info:
  title: crawlerd internal API
  version: 0.1.0
components:
  schemas:
    CrawlerErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - message
          properties:
            message:
              type: string
          additionalProperties: false
      additionalProperties: false
    CrawlerHealthResponse:
      type: object
      required:
        - ready
        - capacity
      properties:
        ready:
          type: boolean
        capacity:
          type: object
          required:
            - running
          properties:
            running:
              type: integer
              minimum: 0
          additionalProperties: false
      additionalProperties: false
    CrawlerRunRequest:
      type: object
      required:
        - url
        - timeout_ms
      properties:
        url:
          type: string
          minLength: 1
        timeout_ms:
          type: integer
          minimum: 1
      additionalProperties: false
    CrawlerRunResult:
      type: object
      required:
        - status
        - exit_code
      properties:
        status:
          type: string
          enum:
            - succeeded
            - failed
          description: Terminal crawler daemon execution state for a run.
        exit_code:
          type: integer
        seed_probe:
          type: object
          properties:
            status:
              type: integer
            load_state:
              type: integer
          additionalProperties: false
        failure_detail:
          type: string
      additionalProperties: false
    CrawlerTarRunResponse:
      type: string
      format: binary
      description: Tar archive with fixed entry names result.json, stdout.log, stderr.log, optional capture.wacz, and optional pages.jsonl.
paths:
  /healthz:
    get:
      operationId: getCrawlerHealth
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - ready
                  - capacity
                properties:
                  ready:
                    type: boolean
                  capacity:
                    type: object
                    required:
                      - running
                    properties:
                      running:
                        type: integer
                        minimum: 0
                    additionalProperties: false
                additionalProperties: false
  /run:
    post:
      operationId: runCapture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - timeout_ms
              properties:
                url:
                  type: string
                  minLength: 1
                timeout_ms:
                  type: integer
                  minimum: 1
              additionalProperties: false
      responses:
        "200":
          description: Blocking terminal crawler result as a tar archive with fixed entry names.
          content:
            application/x-tar:
              schema:
                type: string
                format: binary
                description: Tar archive with fixed entry names result.json, stdout.log, stderr.log, optional capture.wacz, and optional pages.jsonl.
                title: CrawlerTarRunResponse
        "400":
          description: Request validation error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: object
                    required:
                      - message
                    properties:
                      message:
                        type: string
                    additionalProperties: false
                additionalProperties: false
                title: CrawlerErrorEnvelope
servers:
  - url: /
