version: "3.9"
services:
  egress_proxy:
    container_name: egress_proxy
    image: localhost/webshot-squid-openssl:prodlike
    build:
      context: ./squid_image
    restart: on-failure
    command: ["/bin/sh", "/usr/local/bin/squid_start.sh"]
    networks:
      - egress_net
      - crawler_net
    extra_hosts:
      - "host.containers.internal:host-gateway"
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
      - ./squid.mode.prodlike.conf:/etc/squid/squid.mode.conf:ro
      - /tmp/webshot_mitm/squid_ca.pem:/etc/squid/webshot_ca.pem:ro
      - ./squid_start.sh:/usr/local/bin/squid_start.sh:ro
      - ./webshot_denylist_acl.sh:/usr/local/bin/webshot_denylist_acl.sh:ro
      - ./healthcheck_squid.sh:/usr/local/bin/healthcheck_squid.sh:ro
    healthcheck:
      test: ["CMD", "/bin/sh", "/usr/local/bin/healthcheck_squid.sh"]
      interval: disable
      timeout: 2s
      retries: 60
  servicedb:
    container_name: servicedb
    image: docker.io/postgres:18.1-trixie@sha256:5ec39c188013123927f30a006987c6b0e20f3ef2b54b140dfa96dac6844d883f
    restart: on-failure
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ../../sql/schema:/docker-entrypoint-initdb.d/schema:ro
      - ../../container/service_db_init_multi_db.sh:/docker-entrypoint-initdb.d/10_service_db_init_multi_db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres"]
      interval: disable
      timeout: 2s
      retries: 60
  webshot_test_target:
    container_name: webshot_test_target
    image: docker.io/nginx:alpine@sha256:b3c656d55d7ad751196f21b7fd2e8d4da9cb430e32f646adcf92441b72f82b14
    restart: on-failure
    networks:
      crawler_net:
        aliases:
          - test-target
          - asset.test-target
    volumes:
      - ../../container/nginx_test.conf:/etc/nginx/conf.d/default.conf:ro
networks:
  crawler_net:
    name: crawler_net
    external: true
  egress_net:
    name: egress_net
    external: true
