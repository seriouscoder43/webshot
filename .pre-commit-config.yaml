  #      entry: sh -c "docker run --rm -v $PWD:/pwd trufflesecurity/trufflehog:latest git file:///pwd --since-commit HEAD --results=verified,unknown --fail"
  #      language: system
  #      stages: ["pre-commit", "pre-push"]
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
        - id: clang-format
          files: .(c|h|cpp|hpp)$
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
        - id: cmake-format
          files: (\.cmake|CMakeLists.txt)(.in)?$
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 25.11.0
    hooks:
        - id: black
          language_version: python3.11
