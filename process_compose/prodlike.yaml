version: "0.5"
is_strict: true
ordered_shutdown: true
log_location: "@STATE_DIR@/process-compose.log"
processes:
  crawlerd:
    command: "crawlerd --socket-path @STATE_DIR@/crawlerd.sock"
    working_dir: "@REPO_ROOT@/webshotd"
    log_location: "@STATE_DIR@/crawlerd.log"
    environment:
      - "CPU_LIMIT=@CPU_LIMIT@"
      - "DEPLOY_VCPU_LIMIT=@DEPLOY_VCPU_LIMIT@"
    readiness_probe:
      exec:
        command: "python3 @REPO_ROOT@/process_compose/check_crawlerd_ready.py @STATE_DIR@/crawlerd.sock"
      period_seconds: 1
      timeout_seconds: 1
      failure_threshold: 30
  webshotd:
    command: "@WEBSHOTD_BIN@ --config @REPO_ROOT@/webshotd/config/static_config.yaml --config_vars @STATE_DIR@/config_vars.yaml"
    working_dir: "@REPO_ROOT@/webshotd"
    log_location: "@STATE_DIR@/webshotd.log"
    environment:
      - "LD_LIBRARY_PATH=@WEBSHOTD_RUNTIME_LD_LIBRARY_PATH@"
      - "CPU_LIMIT=@CPU_LIMIT@"
      - "DEPLOY_VCPU_LIMIT=@DEPLOY_VCPU_LIMIT@"
    depends_on:
      crawlerd:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: "127.0.0.1"
        port: "8081"
        scheme: "http"
        path: "/service/monitor?format=json"
      period_seconds: 1
      timeout_seconds: 1
      failure_threshold: 60
