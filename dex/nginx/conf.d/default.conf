server {
  listen 80;
  listen [::]:80;
  server_name mydomain.com;

  location /.well-known/acme-challenge/ { root /srv/www/acme; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name mydomain.com;

  http2 on;

  ssl_certificate     /srv/certs/fullchain.pem;
  ssl_certificate_key /srv/certs/privkey.pem;

  # Proxy Dex under /dex/ (issuer: https://mydomain.com/dex)
  location = /dex {
    return 302 /dex/auth;
  }
  location /dex/ {
    # Keep the /dex prefix so requests match Dex's configured issuer path.
    proxy_pass http://dex:5556;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
  }

  location /.well-known/acme-challenge/ { root /srv/www/acme; }
}
