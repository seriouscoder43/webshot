services:
  dex:
    image: ghcr.io/dexidp/dex:latest
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./config.yaml:/etc/dex/config.yaml:ro
    ports:
      - "5556:5556"
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    depends_on:
      - dex
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /srv/certs:/srv/certs:ro
    restart: unless-stopped
