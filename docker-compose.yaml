services:
    webshotdb:
        image: postgres:15.10-bookworm
        container_name: webshotdb
        dns: ["172.17.0.1"]
        environment:
            POSTGRES_HOST_AUTH_METHOD: trust
        ports:
            - 5432:5432
        volumes:
            - type: bind
              source: ./sql/schema
              target: /docker-entrypoint-initdb.d
    webshot-storage-server:
        image: nginx:alpine
        container_name: webshot_storage_server
        dns: ["172.17.0.1"]
        ports:
            - 8081:80
        volumes:
            - type: bind
              source: /tmp/build-webshot-san/wacz
              target: /usr/share/nginx/html
              read_only: true
            - type: bind
              source: ./docker/storage-nginx.conf
              target: /etc/nginx/conf.d/default.conf
              read_only: true
    scalar:
        image: scalarapi/api-reference:latest
        container_name: webshot_scalar
        dns: ["172.17.0.1"]
        environment:
            API_REFERENCE_CONFIG: '{"sources":[{"url":"/openapi/webshot.yaml"}],"layout":{"hideDownloadButton":false}}'
        volumes:
            - type: bind
              source: ./schemas
              target: /openapi
              read_only: true
    reverse-proxy:
        image: nginx:alpine
        container_name: webshot_reverse_proxy
        dns: ["172.17.0.1"]
        ports:
            - 8085:80
        volumes:
            - type: bind
              source: ./docker/nginx.conf
              target: /etc/nginx/conf.d/default.conf
              read_only: true
            - type: bind
              source: ./schemas
              target: /data/openapi
              read_only: true
        depends_on:
            - scalar
        extra_hosts:
            - "host.docker.internal:host-gateway"
