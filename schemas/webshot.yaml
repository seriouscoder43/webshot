openapi: 3.0.3
info:
  title: Webshot Service API
  version: 0.1.0
paths:
  /v1/webshot:
    get:
      summary: List capture UUIDs by URL
      description: Returns an array of UUIDv4 capture identifiers for the given URL (latest first).
      parameters:
        - in: query
          name: url
          required: true
          schema:
            type: string
            format: uri
          description: Page URL to list.
      responses:
        '200':
          description: Array of UUIDv4 capture identifiers (latest first).
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  format: uuid
        '400':
          description: Bad request (invalid URL).
        '404':
          description: No captures found for the given URL.
    post:
      summary: Enqueue capture of a webshot
      description: Triggers asynchronous capture of the provided URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
      responses:
        '201':
          description: Capture accepted for processing.
        '400':
          description: Invalid JSON or URL supplied.

  /v1/webshot/{uuid}:
    get:
      summary: Redirect to stored WACZ by UUID
      parameters:
        - in: path
          name: uuid
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '302':
          description: Found; Location header points to the stored WACZ.
          headers:
            Location:
              description: Canonical storage URL of the WACZ file.
              schema:
                type: string
                format: uri
        '404':
          description: Webshot not found.
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
